<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:#f5f7fa;
color:#333;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 16px;
background:#000;
position:fixed;
width:100%;
top:0;
z-index:15;
}

.logo img{
height:30px;
filter:brightness(0) invert(1);
}

/* MENU */
.menu-btn{
font-size:2rem;
color:#fcbf49;
background:none;
border:none;
cursor:pointer;
}

.dropdown{
display:none;
position:absolute;
right:0;
top:50px;
background:#000;
border:1px solid #333;
border-radius:5px;
min-width:180px;
}

.dropdown.show{
display:block;
}

.dropdown a{
display:block;
padding:12px 20px;
color:#fcbf49;
text-decoration:none;
font-weight:600;
}

.dropdown a:hover{
background:#333;
}

/* HERO */
.hero{
height:100vh;
background-image:url('image/sofa1.jpg');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:0 40px;
margin-top:50px;
}

.hero h1{
font-size:3rem;
color:#fff;
margin-bottom:15px;
}

.hero p{
font-size:1.3rem;
color:#000;
margin-bottom:30px;
}

.hero button{
background:#fcbf49;
border:none;
padding:15px 35px;
font-weight:700;
cursor:pointer;
border-radius:5px;
}

/* REVIEWS SECTION */

.customer-reviews{
padding:60px 20px;
background:#fff;
text-align:center;
}

.customer-reviews h2{
font-size:2rem;
margin-bottom:30px;
color:#000;
}

#reviews-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
max-width:1000px;
margin:auto;
}

.review-card{
background:#f9f9f9;
padding:20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:left;
}

.review-card h4{
margin-bottom:6px;
}

.stars{
color:#fcbf49;
font-size:18px;
margin-bottom:10px;
}

.review-card p{
margin-bottom:8px;
}

.review-card small{
color:#777;
}

/* WHATSAPP */

.whatsapp-btn{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 8px rgba(0,0,0,0.3);
}

.whatsapp-btn img{
width:30px;
}

/* FOOTER */

footer{
background:#000;
color:#fcbf49;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<div class="logo">

</div>

<nav>

<div class="dropdown" id="dropdown-menu">

<a href="return.html">Return</a>

</div>
</nav>
</header>

<section class="hero">
<h1>Discover Comfort & Style with Eshifumbi Furniture</h1>
<p>Your one-stop shop for quality sofas, chairs, beds & more at unbeatable prices.</p>
<button onclick="location.href='shop.html'">Shop Now</button>
</section>

<!-- REVIEWS SECTION -->

<section class="customer-reviews">

<h2>What Our Customers Say</h2>

<div id="reviews-container"></div>

</section>

<footer>

<script>

/* MENU */

const menuBtn=document.querySelector('.menu-btn');
const dropdown=document.getElementById('dropdown-menu');

menuBtn.addEventListener('click',()=>{
dropdown.classList.toggle('show');
});

/* LOAD REVIEWS */

async function loadReviews(){

try{

const response=await fetch("reviews.json");

const reviews=await response.json();

const container=document.getElementById("reviews-container");

reviews.forEach(r=>{

const card=document.createElement("div");

card.className="review-card";

card.innerHTML=`

<h4>${r.name}</h4>

<div class="stars">${"⭐".repeat(r.rating)}</div>

<p>${r.review}</p>

<small>${r.date}</small>

`;

container.appendChild(card);

});

}

catch(error){

console.log("Reviews not loaded yet");

}

}

loadReviews();

</script>

</body>
